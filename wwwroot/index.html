<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Options File Checker</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./app.css">
</head>

<body>
    <div class="window">
        <!-- 30 px margin all around -->
        <div class="app-header">
            <h1 class="app-title">Options File Checker</h1>
            <span id="version-display"></span>
        </div>
        <div class="grid">

            <!-- Row 0 – Label -->
            <label class="label">License file path</label>

            <!-- Row 1 – Input + Browse -->
            <div class="input-group">
                <input type="text" class="textbox" id="licenseFileTextbox"
                    placeholder="Browse to your license file" disabled>
                <button id="LicenseFileBrowseButton" class="btn">Browse</button>
                <input id="licenseFilePicker" type="file" style="display:none" accept=".dat,.lic" />
            </div>

            <!-- Row 2 – Label -->
            <label class="label">Options file path</label>

            <!-- Row 3 – Input + Browse -->
            <div class="input-group">
                <input type="text" class="textbox" id="optionsFileTextbox"
                    placeholder="Browse to your options file" disabled>
                <button id="OptionsFileBrowseButton" class="btn">Browse</button>
                <input id="optionsFilePicker" type="file" style="display:none" accept=".opt" />
            </div>

            <!-- Drag-and-drop hint -->
            <div class="drag-drop-hint">You can also drag and drop files onto this page.</div>

            <!-- Row 4 – Output text block -->
            <div class="output-text" id="outputTextbox">
                <p>Warning messages will appear here after analysis. Errors will appear in a pop-up window.</p>
            </div>

            <!-- Row 5 – Tree view placeholder -->
            <div class="output-tree">
                <!-- TODO: render tree view items here. :) -->
            </div>

            <!-- Action buttons -->
            <div class="action-buttons">
                <button id="analyzerButton" class="btn" disabled>Analyze</button>
                <button class="btn">Save Output</button>
            </div>
        </div>
    </div>
    <!-- Drag-and-drop overlay -->
    <div id="drop-overlay" class="drop-overlay hidden">
        <div class="drop-overlay-content">
            <svg class="drop-overlay-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="18" x2="12" y2="12"/>
                <polyline points="9 15 12 18 15 15"/>
            </svg>
            <div class="drop-overlay-text">Drop file to upload</div>
            <div class="drop-overlay-subtext">License files (.lic, .dat) and Options files (.opt)</div>
        </div>
    </div>

    <!-- File type prompt modal -->
    <div id="file-type-modal-overlay" class="file-type-modal-overlay hidden">
        <div class="file-type-modal-dialog">
            <div class="file-type-modal-title">File Type</div>
            <div class="file-type-modal-message" id="file-type-modal-message"></div>
            <div class="file-type-modal-actions">
                <button id="file-type-btn-license" class="btn">License File</button>
                <button id="file-type-btn-options" class="btn">Options File</button>
                <button id="file-type-btn-cancel" class="btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- JavaScript goodies -->
    <script src="version.js"></script>
    <script src="errorMessageFunction.js"></script>
    <script src="fileValidation.js"></script>
    <script src="licenseFilePicker.js"></script>
    <script src="optionsFilePicker.js"></script>
    <script src="analyzerButton.js"></script>
    <script src="updateAnalyzerButtonState.js"></script>
    <script src="dataGatherer.js"></script>
    <script src="dataAnalyzer.js"></script>
    <script src="dragDrop.js"></script>
</body>

</html>
